services:
  api:
    build: ./server
    ports:
      - "4000:4000"
      - "9229:9229"
    environment:
      PORT: "4000"
      LOG_LEVEL: "debug"
    command: ["npm", "run", "dev:debug"]
    volumes:
      - ./server:/app
      - /app/node_modules
  db:
    image: mysql:8.0
    container_name: budgetbook-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bgtbk
      MYSQL_USER: app
      MYSQL_PASSWORD: bgtbkpass
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
volumes:
  mysql_data:
